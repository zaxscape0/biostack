<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1080px; height:1080px; font-family:'Inter',sans-serif; background:#f8fafc; color:#0f172a; overflow:hidden; }
  .container { width:100%; height:100%; display:flex; flex-direction:column; justify-content:center; padding:80px; position:relative; }
  .logo { position:absolute; bottom:40px; right:50px; display:flex; align-items:center; gap:10px; }
  .logo-icon { width:28px; height:28px; border-radius:50%; background:#0891b2; }
  .logo-text { font-size:18px; font-weight:700; color:#64748b; letter-spacing:0.5px; }
  .tag { position:absolute; top:40px; left:50px; font-size:13px; font-weight:600; text-transform:uppercase; letter-spacing:3px; color:#0891b2; }
  h1 { font-size:52px; font-weight:900; line-height:1.15; margin-bottom:24px; }
  h2 { font-size:38px; font-weight:800; line-height:1.2; margin-bottom:20px; }
  h3 { font-size:28px; font-weight:700; line-height:1.3; margin-bottom:16px; }
  p { font-size:22px; line-height:1.6; color:#64748b; }
  .highlight { color:#0891b2; }
  .accent { color:#7c3aed; }
  .danger { color:#e11d48; }
  .success { color:#059669; }
  .warning { color:#d97706; }
  .pill { display:inline-block; padding:6px 16px; border-radius:20px; font-size:14px; font-weight:600; margin:4px; }
  .pill-primary { background:#0891b220; color:#0891b2; border:1px solid #0891b240; }
  .pill-accent { background:#7c3aed20; color:#7c3aed; border:1px solid #7c3aed40; }
  .divider { width:60px; height:3px; background:#0891b2; margin:20px 0; border-radius:2px; }
  .grid { display:grid; gap:20px; }
  .card { background:#ffffff; border:1px solid #e2e8f0; border-radius:16px; padding:28px; }
  .stat { text-align:center; }
  .stat-value { font-size:48px; font-weight:900; }
  .stat-label { font-size:16px; color:#64748b; margin-top:4px; }
  .list-item { display:flex; align-items:flex-start; gap:14px; margin-bottom:18px; font-size:22px; }
  .list-icon { flex-shrink:0; width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; margin-top:3px; }
  .check { background:#05966925; color:#059669; }
  .cross { background:#e11d4825; color:#e11d48; }
  .num { background:#0891b225; color:#0891b2; }
  .vs-container { display:flex; gap:24px; margin-top:24px; }
  .vs-col { flex:1; }
  .vs-header { font-size:16px; font-weight:700; text-transform:uppercase; letter-spacing:2px; margin-bottom:16px; padding-bottom:12px; border-bottom:2px solid; }
  .glow { text-shadow: 0 0 40px #0891b240; }
  .bottom-cta { position:absolute; bottom:40px; left:50px; font-size:16px; color:#64748b; }
  .bottom-cta span { color:#0891b2; font-weight:600; }
  .range-bar { height:12px; border-radius:6px; background:#e2e8f0; margin:8px 0; position:relative; overflow:hidden; }
  .range-fill { height:100%; border-radius:6px; }
  .emoji { font-size:48px; margin-bottom:16px; }
</style>
</head><body>
<div class="container" style="text-align:center; justify-content:center; align-items:center;">
  <div class="tag" style="left:50%; transform:translateX(-50%);">Community Poll</div>
  <div class="emoji">💊</div>
  <h1 style="font-size:46px;">How many supplements are you taking daily?</h1>
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:40px; width:100%;">
    <div class="card" style="text-align:center; cursor:pointer;"><span style="font-size:32px; font-weight:800; color:#0891b2;">A</span><p style="font-size:18px; margin-top:8px;">0-2</p><p style="font-size:14px;">Keeping it minimal</p></div>
    <div class="card" style="text-align:center;"><span style="font-size:32px; font-weight:800; color:#7c3aed;">B</span><p style="font-size:18px; margin-top:8px;">3-5</p><p style="font-size:14px;">The basics</p></div>
    <div class="card" style="text-align:center;"><span style="font-size:32px; font-weight:800; color:#059669;">C</span><p style="font-size:18px; margin-top:8px;">6-10</p><p style="font-size:14px;">Dialed in</p></div>
    <div class="card" style="text-align:center;"><span style="font-size:32px; font-weight:800; color:#d97706;">D</span><p style="font-size:18px; margin-top:8px;">11+</p><p style="font-size:14px;">Walking pharmacy</p></div>
  </div>
  <p style="font-size:18px; margin-top:30px;">Drop your letter below 👇</p>
</div>
<div class="logo"><div class="logo-icon"></div><div class="logo-text">BioStack</div></div>
</body></html>
