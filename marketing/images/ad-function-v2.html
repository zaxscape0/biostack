  .bg-warm-overlay {
    position:absolute; inset:0;
    background: linear-gradient(180deg, 
      rgba(30,20,10,0.05) 0%, 
      rgba(20,15,8,0.1) 30%, 
      rgba(10,10,10,0.45) 55%, 
      rgba(10,10,10,0.75) 75%, 
      rgba(10,10,10,0.88) 100%
    );
    mix-blend-mode: normal;
  }
  .bg-warm-tint {
    position:absolute; inset:0;
    background: rgba(40,25,10,0.1);
    mix-blend-mode: multiply;
  }

  .dot-grid {
    position:absolute; inset:0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
    background-size: 22px 22px;
    opacity:0.5;
  }

  .content {
    position:relative; z-index:5; width:100%; height:100%;
    display:flex; flex-direction:column; padding:60px 70px;
  }

  .chart-section {
    margin-top:200px;
    position:relative;
  }

  .logo-row {
    display:flex; align-items:center; gap:12px;
    margin-bottom:24px;
  }
  .logo-row img { width:34px; height:34px; border-radius:8px; }
  .logo-row span { font-size:22px; font-weight:600; color:white; }

  .headline {
    font-family:'Playfair Display', serif;
    font-size:78px;
    line-height:1.08;
    color:white;
    margin-top:40px;
  }
  .headline em {
    font-style:italic;
    color:white;
  }

  .subtext {
    font-family:'Playfair Display', serif;
    font-size:23px;
    color:rgba(255,255,255,0.7);
    line-height:1.5;
    margin-top:24px;
    max-width:480px;
  }

  .social-proof {
    display:flex; align-items:center; gap:40px;
    margin-top:auto; margin-bottom:10px;
  }
  .stars { color:white; font-size:20px; letter-spacing:2px; }
  .proof-stat { font-size:17px; color:rgba(255,255,255,0.85); font-weight:600; margin-top:6px; }
  .avatars { display:flex; margin-top:10px; }
  .avatar {
    width:36px; height:36px; border-radius:50%; border:2px solid rgba(10,10,10,0.9);
    margin-left:-8px; display:flex; align-items:center; justify-content:center;
    font-size:13px; font-weight:700; color:white;
  }
  .avatar:first-child { margin-left:0; }
</style>
