<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&family=Inter:wght@400;500;600;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1080px; height:1350px; font-family:'Inter',sans-serif; overflow:hidden; position:relative; background:#0a0a0a; }

  /* Dark moody background with warm tones */
  .bg-layer {
    position:absolute; inset:0;
    background:
      radial-gradient(ellipse at 40% 30%, rgba(120,80,40,0.4) 0%, transparent 50%),
      radial-gradient(ellipse at 70% 60%, rgba(80,60,30,0.3) 0%, transparent 40%),
      radial-gradient(ellipse at 30% 70%, rgba(47,170,106,0.08) 0%, transparent 40%),
      linear-gradient(180deg, #1a1208 0%, #0d0a06 40%, #0a0a0a 100%);
  }

  /* Dot grid overlay */
  .dot-grid {
    position:absolute; inset:0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px);
    background-size: 24px 24px;
    opacity:0.6;
  }

  /* Gradient fade at bottom */
  .bottom-fade {
    position:absolute; bottom:0; left:0; right:0; height:60%;
    background: linear-gradient(0deg, rgba(10,10,10,0.95) 0%, rgba(10,10,10,0.7) 40%, transparent 100%);
  }

  .content {
    position:relative; z-index:5; width:100%; height:100%;
    display:flex; flex-direction:column; padding:60px 70px;
  }

  /* Chart area */
  .chart-area {
    margin-top:80px;
    position:relative;
    height:280px;
  }

  .logo-float {
    display:flex; align-items:center; gap:12px;
    margin-bottom:30px;
  }
  .logo-float img { width:36px; height:36px; border-radius:8px; }
  .logo-float span { font-size:22px; font-weight:700; color:white; }

  /* Typography - Playfair Display for that serif look */
  .headline {
    font-family:'Playfair Display', serif;
    font-size:76px;
    line-height:1.1;
    color:white;
    margin-top:auto;
  }
  .headline em {
    font-style:italic;
    color:#2faa6a;
  }

  .subtext {
    font-family:'Inter',sans-serif;
    font-size:22px;
    color:rgba(255,255,255,0.7);
    line-height:1.5;
    margin-top:20px;
    max-width:520px;
  }

  /* Social proof */
  .social-proof {
    display:flex; align-items:center; gap:40px;
    margin-top:40px; margin-bottom:20px;
  }
  .proof-left {}
  .stars { color:#2faa6a; font-size:22px; letter-spacing:2px; }
  .proof-stat { font-size:18px; color:rgba(255,255,255,0.8); font-weight:600; margin-top:6px; }
  .avatars { display:flex; margin-top:10px; }
  .avatar {
    width:38px; height:38px; border-radius:50%; border:2px solid #0a0a0a;
    margin-left:-8px; display:flex; align-items:center; justify-content:center;
    font-size:14px; font-weight:700; color:white;
  }
  .avatar:first-child { margin-left:0; }
</style>
</head>

<div class="dot-grid"></div>
<div class="bottom-fade"></div>
